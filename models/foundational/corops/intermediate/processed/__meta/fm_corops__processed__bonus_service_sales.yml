version: 2

models:
  - name: fm_corops__processed__bonus_service_sales
    description: "Corops Processed Bonus Service Sales"
    config:
      alias: processed__bonus_service_sales
    columns:
      - name: eid
        data_type: STRING
        description: Record identifier
      - name: bonus_type_for_calculation
        data_type: STRING
        description: Bonus type for calculation
      - name: bonus_percent
        data_type: NUMERIC.PRICE
        description: Bonus percent
      - name: is_bonus_without_cost_price
        data_type: BOOLEAN
        description: Use cost price for bonus calculation
      - name: fixed_bonus_sum
        data_type: NUMERIC.COST
        description: Fixed bonus sum
      - name: cost_for_bonus
        data_type: NUMERIC.COST
        description: Cost for bonus calculation
      - name: base_for_bonus
        data_type: NUMERIC.COST
        description: Base for bonus calculation
      - name: bonus_calculated
        data_type: NUMERIC.COST
        description: Calculated total employee bonus for selling service. Can be negative
      - name: bonus_total
        data_type: NUMERIC.COST
        description: Total employee bonus for selling service
      - name: retro_bonus_total
        data_type: NUMERIC.COST
        description: Total employee retro bonus for selling service
      - name: retro_bonus_visit
        data_type: NUMERIC
        description: Visit number for retro bonus payment
      - name: visit_number
        data_type: INTEGER
        description: Number of clients visit
      - name: is_calc_retro_bonus
        data_type: BOOLEAN
        description: Is calculate retro bonus
