version: 2

models:
  - name: ds_cleverbox__interm__bonus_goods_sales
    description: "CleverBox Intermediate Bonus Goods Sales"
    config:
      alias: interm__bonus_goods_sales
      meta:
        tf_config:
          filter: eid IS NOT NULL
    columns:
      - name: eid
        data_type: STRING
        description: Record identifier
      - name: bonus_employee_code
        data_type: STRING
        description: Bonus code from bonus_employee table
      - name: bonus_employee_type
        data_type: STRING
        description: Bonus type from bonus_employee table
      - name: bonus_employee_value
        data_type: NUMERIC.PRICE
        description: Bonus value from bonus_employee table
      - name: bonus_type_for_calculation
        data_type: STRING
        description: Bonus type for calculation employee bonus
      - name: cleverbox_bonus_type
        data_type: STRING
        description: Bonus type for calculation employee cleverbox bonus
      - name: cleverbox_base_for_bonus
        data_type: NUMERIC.PRICE
        description: Base for cleverbox bonus calculation
      - name: bonus_percent
        data_type: NUMERIC.PRICE
        description: Bonus percent
      - name: fixed_bonus_sum
        data_type: NUMERIC.PRICE
        description: Fixed bonus sum
      - name: cleverbox_bonus_total
        data_type: NUMERIC.COST
        description: Employee bonus for selling a goods according Cleverbox
