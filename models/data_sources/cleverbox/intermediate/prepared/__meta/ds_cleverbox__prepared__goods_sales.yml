version: 2

models:
  - name: ds_cleverbox__prepared__goods_sales
    description: "CleverBox Prepared Goods Sales"
    config:
      alias: prepared__goods_sales
      meta:
        tf_config:
          filter: eid IS NOT NULL
    columns:
      - name: eid
        data_type: STRING
        description: Record identifier
      - name: date
        data_type: DATE
        description: Goods date of sale
      - name: branch
        data_type: STRING
        description: Branch of goods sale
      - name: expert_name
        data_type: STRING
        description: The employee who sold the goods
      - name: expert_position
        data_type: STRING
        description: Position of employee
      - name: client_id
        data_type: STRING
        description: Client id
      - name: client_name
        data_type: STRING
        description: Client name
      - name: is_vip
        data_type: BOOLEAN
        description: Client is VIP
      - name: is_employee
        data_type: BOOLEAN
        description: Client is employee
      - name: goods_name
        data_type: STRING
        description: Goods name
      - name: brand
        data_type: STRING
        description: Brand of goods
      - name: amount
        data_type: NUMERIC.AMOUNT
        description: Amount of goods sold
      - name: paid
        data_type: NUMERIC.COST
        description: Paid
      - name: price
        data_type: NUMERIC.PRICE
        description: Price of goods
      - name: cost_price_unit
        data_type: NUMERIC.PRICE
        description: Cost price of one goods
      - name: income_total
        data_type: NUMERIC.COST
        description: Income from goods sales
      - name: cost_total
        data_type: NUMERIC.COST
        description: Total cost of goods
      - name: cost_price_total
        data_type: NUMERIC.COST
        description: Cost price of goods
      - name: discount_total
        data_type: NUMERIC.COST
        description: Goods discount
