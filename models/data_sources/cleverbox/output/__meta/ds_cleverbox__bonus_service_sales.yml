version: 2

models:
  - name: ds_cleverbox__bonus_service_sales
    description: "CleverBox Prepared bonuses"
    config:
      alias: bonus_service_sales
    columns:
      - name: eid
        data_type: STRING
        description: Record identifier
      - name: bonus_employee__code
        data_type: STRING
        description: Bonus code from bonus_employee table
      - name: bonus_employee__type
        data_type: STRING
        description: Bonus type from bonus_employee table
      - name: bonus_employee__bonus_first_visit
        data_type: NUMERIC.COST
        description: Bonus value for first visit if paid less min expected sum from bonus_employee table
      - name: visit_sum
        data_type: NUMERIC.COST
        description: Sum which client spent
      - name: discount_usage_discount_name
        data_type: STRING
        description: Discount name from discount_usage table
      - name: visit_number
        data_type: INTEGER
        description: Number of clients visit
      - name: discount_rate
        data_type: NUMERIC.PRICE
        description: Discount rate
      - name: discount_name_source
        data_type: STRING
        description: ""
      - name: is_bonus_without_cost_price
        data_type: BOOLEAN
        description: Is bonus calculate without cost price
      - name: bonus_type_for_calculation
        data_type: STRING
        description: Bonus type for calculation employee bonus
      - name: bonus_percent
        data_type: NUMERIC.PRICE
        description: Bonus percent
      - name: fixed_bonus_sum
        data_type: NUMERIC.COST
        description: Fixed bonus sum
      - name: bonus_cleverbox_base_for_bonus
        data_type: NUMERIC.COST
        description: Bonus Cleverbox base for bonus calculation
      - name: cleverbox_bonus_type
        data_type: STRING
        description: Bonus Cleverbox ype
      - name: bonus_cleverbox_unit
        data_type: NUMERIC.COST
        description: Bonus Cleverbox unit
      - name: bonus_cleverbox_total
        data_type: NUMERIC.COST
        description: Bonus Cleverbox total
      - name: direction
        data_type: STRING
        description: Direction
      - name: retro_bonus
        data_type: NUMERIC.COST
        description: Retro bonus
      - name: retro_bonus_visit
        data_type: NUMERIC
        description: Visit number for retro bonus payment
      - name: is_calc_retro_bonus
        data_type: BOOLEAN
        description: Is calculate retro bonus
