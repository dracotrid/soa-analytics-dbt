version: 2

sources:
  - name: ds_cleverbox
    database: "{{ var('primary_bigquery_database_name') }}"
    schema: "soa_{{ var('source_env', 'stage' if target.name == 'stage' else 'prod') }}_ds_cleverbox"
    tags: ["scope:data-source", "ds-name:cleverbox", "asset-type:raw"]
    loader: google_sheet

    tables:
      - name: raw__expert_own_clients
        identifier: raw__expert_own_clients
        description: "CleverBox raw Expert own clients"
        columns:
          - name: expert_name
            data_type: STRING
            description: Expert name
          - name: client_code
            data_type: STRING
            description: Client code
          - name: client_name
            data_type: STRING
            description: Client name
