version: 2

models:
  - name: dm_reports__src__bonus_service_sales
    description: "Reports Source Bonus Service Sales"
    config:
      alias: src__bonus_service_sales
    columns:
      - name: eid
        data_type: STRING
        description: Record identifier
      - name: base_for_bonus
        data_type: NUMERIC.COST
        description: Base for bonus calculation
      - name: retro_bonus_total
        data_type: NUMERIC.COST
        description: Total employee retro bonus for selling service
      - name: retro_bonus_visit
        data_type: NUMERIC
        description: Visit number for retro bonus payment
      - name: visit_number
        data_type: INTEGER
        description: Number of clients visit
