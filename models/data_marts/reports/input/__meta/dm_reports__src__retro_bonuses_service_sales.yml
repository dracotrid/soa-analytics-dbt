version: 2

models:
  - name: dm_reports__src__retro_bonuses_service_sales
    description: "Reports Source Retro Bonuses Service Sales"
    config:
      alias: src__retro_bonuses_service_sales
    columns:
      - name: eid
        data_type: STRING
        description: Record identifier
      - name: date
        data_type: DATE
        description: Goods date of sale
      - name: branch
        data_type: STRING
        description: Branch of goods sale
      - name: expert_name
        data_type: STRING
        description: The employee who sold the goods
      - name: client_code
        data_type: STRING
        description: Client code
      - name: client_name
        data_type: STRING
        description: Client name
      - name: service_code
        data_type: STRING
        description: Service code
      - name: service_name
        data_type: STRING
        description: Service name
      - name: retro_bonus_total
        data_type: NUMERIC.COST
        description: Total employee retro bonus for selling service
